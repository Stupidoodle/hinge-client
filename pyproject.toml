[project]
name = "hinge"
version = "0.1.0"
description = "Reverse-engineered Hinge mobile API client with chat persistence and FastAPI surface."
authors = [
    { name = "Bryan", email = "bryan.tran053@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.18.4",
    "certifi>=2026.4.22",
    "httpx>=0.28.1",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.1",
    "python-dotenv>=1.2.2",
    "python-jose>=3.5.0",
    "sqlalchemy>=2.0.49",
    "structlog>=25.5.0",
    "websockets>=16.0",
]

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 88
target-version = "py314"
src = ["src", "tests"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    "venv",
    ".venv",
    ".mypy_cache",
    ".pytest_cache",
    "node_modules",
    ".ruff_cache",
    "migrations/versions",
]

[tool.ruff.lint]
select = ["E", "F", "C", "D", "B", "I", "Q"]
ignore = ["E203", "D203", "D213", "I001"]
fixable = ["E", "I"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D"]
"src/hinge/__init__.py" = ["D104"]

[tool.mypy]
strict_equality = true
check_untyped_defs = true
python_version = "3.14"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests that hit real Hinge or Sendbird APIs",
]

[dependency-groups]
dev = [
    "mypy>=2.0.0",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.12",
]

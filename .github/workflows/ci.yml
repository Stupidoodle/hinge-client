name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Least privilege by default; no job needs more for CI.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # hatch-vcs needs full history/tags to derive the version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (ty)
        run: uv run ty check src

      - name: Leak-canary (no RE methodology in tracked files)
        run: uv run pytest tests/test_no_secrets.py -q

      - name: Tests + 100% branch coverage
        run: uv run pytest -m "not integration" --cov=src/hinge --cov-branch --cov-fail-under=100

      - name: Build
        run: uv build

      - name: Check artifacts
        run: uv run twine check dist/*

      - name: Audit runtime dependencies
        run: |
          uv export --frozen --no-dev --no-emit-project --output-file requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt

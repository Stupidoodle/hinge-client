name: Release

# Automated, conventional-commit-driven releases via python-semantic-release.
# Pushing feat:/fix:/etc. to master computes the next version, updates the
# changelog, tags it, and cuts a GitHub Release — then the publish job ships
# it to PyPI via OIDC Trusted Publishing (no stored tokens).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the tag + changelog commit and create the GitHub Release
    outputs:
      released: ${{ steps.psr.outputs.released }}
      tag: ${{ steps.psr.outputs.tag }}
      version: ${{ steps.psr.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Python Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    # Protected environment with a required reviewer (configure in repo settings).
    environment:
      name: pypi
      url: https://pypi.org/p/hinge-client
    permissions:
      id-token: write # OIDC: mint a short-lived token for Trusted Publishing
    steps:
      - name: Checkout released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0 # hatch-vcs derives the version from the tag

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build
        run: uv build

      - name: Check artifacts
        run: uvx twine check dist/*

      - name: Publish to PyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        # attestations: true is the default; do not disable it.

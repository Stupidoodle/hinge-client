name: Release

# Publish to PyPI when a GitHub Release is published. Trusted Publishing (OIDC)
# only — no API tokens are stored anywhere.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # hatch-vcs derives the version from the release tag

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build
        run: uv build

      - name: Check artifacts
        run: uvx twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Protected environment with a required reviewer (configure in repo settings).
    environment:
      name: pypi
      url: https://pypi.org/p/hinge-client
    permissions:
      id-token: write # OIDC: mint a short-lived token for Trusted Publishing
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        # attestations: true is the default; do not disable it.
